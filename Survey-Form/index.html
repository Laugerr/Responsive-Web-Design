<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1 id="title">Travel Survey Form</h1>
        <p id="description">Please fill out the form below.</p>
      </header>

      <form id="survey-form" action="#" method="post">
        <fieldset>
          <legend>Your Info</legend>

          <label for="name" id="name-label">
            Name
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              required
            />
          </label>

          <label for="email" id="email-label">
            Email
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </label>

          <label for="number" id="number-label">
            Age (optional)
            <input
              type="number"
              id="number"
              name="age"
              placeholder="Enter your age"
              min="13"
              max="120"
            />
          </label>
        </fieldset>

        <fieldset>
          <legend>Meal Preference</legend>
          <label for="non-veg"
            ><input
              type="radio"
              id="non-veg"
              name="meal"
              value="non-vegetarian"
              class="inline"
              checked
            />Non-Vegetarian</label
          >
          <label for="veg"
            ><input
              type="radio"
              id="veg"
              name="meal"
              value="vegetarian"
              class="inline"
            />Vegetarian</label
          >
          <label for="vegan"
            ><input
              type="radio"
              id="vegan"
              name="meal"
              value="vegan"
              class="inline"
            />Vegan</label
          >
        </fieldset>

        <fieldset>
          <legend>Travel Class</legend>
          <label for="economy"
            ><input
              type="radio"
              id="economy"
              name="travel-class"
              value="economy"
              class="inline"
              checked
            />Economy</label
          >
          <label for="business"
            ><input
              type="radio"
              id="business"
              name="travel-class"
              value="business"
              class="inline"
            />Business</label
          >
          <label for="first-class"
            ><input
              type="radio"
              id="first-class"
              name="travel-class"
              value="first-class"
              class="inline"
            />First Class</label
          >
        </fieldset>

        <fieldset>
          <legend>Experience</legend>

          <label for="dropdown">Destination</label>
          <select name="destination" id="dropdown" required>
            <option value="" disabled selected>Select a destination</option>
            <option value="marrakech">Marrakech</option>
            <option value="london">London</option>
            <option value="paris">Paris</option>
            <option value="berlin">Berlin</option>
            <option value="new-york">New York</option>
            <option value="other">Other</option>
          </select>

          <label for="experience">
            Your Experience
            <textarea
              name="experience"
              id="experience"
              rows="5"
              placeholder="Share details about your trip"
            ></textarea>
          </label>

          <label for="pictures">
            Upload a travel photo (optional)
            <input type="file" id="pictures" name="pictures" accept="image/*" />
          </label>
        </fieldset>

        <input type="submit" id="submit" value="Submit" />
      </form>
    </main>
  </body>
</html>
